<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sequence Pattern Predictor</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 560px;
        }
        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            color: #111827;
            text-align: center;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.75rem;
            font-size: 0.875rem;
        }

        #boxRow {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        .num-slot {
            position: relative;
        }

        .num-box {
            width: 64px;
            padding: 0.65rem 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            text-align: center;
        }
        .num-box:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        .remove-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 18px;
            height: 18px;
            line-height: 16px;
            border-radius: 50%;
            background: #ef4444;
            color: white;
            border: none;
            font-size: 12px;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .remove-btn:hover {
            background: #dc2626;
        }

        button#predictBtn {
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button#predictBtn:hover {
            background-color: #1d4ed8;
        }
        #result {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e5e7eb;
        }
        .error {
            color: #dc2626;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sequence Predictor</h1>

    <label>Enter your sequence, one number per box:</label>
    <div id="boxRow"></div>

    <button id="predictBtn" onclick="predict()">Analyze & Predict</button>

    <div id="result"></div>
</div>

<script>
// --- DYNAMIC INPUT BOXES ---
const boxRow = document.getElementById("boxRow");
let slotCounter = 0; // ever-increasing id source, so keys never collide even after deletions

function createSlot(prefillValue) {
    const id = slotCounter++;
    const slot = document.createElement("div");
    slot.className = "num-slot";
    slot.dataset.slotId = id;

    const input = document.createElement("input");
    input.type = "text";
    input.inputMode = "decimal";
    input.className = "num-box";
    input.autocomplete = "off";
    if (prefillValue !== undefined) input.value = prefillValue;

    const removeBtn = document.createElement("button");
    removeBtn.type = "button";
    removeBtn.className = "remove-btn";
    removeBtn.textContent = "×";
    removeBtn.setAttribute("aria-label", "Remove this box");
    removeBtn.onclick = () => removeSlot(slot);

    slot.appendChild(input);
    slot.appendChild(removeBtn);

    input.addEventListener("input", () => handleBoxInput(slot, input));
    input.addEventListener("keydown", (e) => handleKeydown(e, slot, input));

    return slot;
}

function isLastSlot(slot) {
    return slot === boxRow.lastElementChild;
}

function handleBoxInput(slot, input) {
    // The moment the LAST box gets any content, spawn a fresh empty box after it.
    // Non-last boxes never spawn anything on input - only the trailing slot does.
    if (isLastSlot(slot) && input.value.trim() !== "") {
        boxRow.appendChild(createSlot());
    }
}

function handleKeydown(e, slot, input) {
    // Backspace on an empty box (that isn't the sole/trailing box) jumps focus
    // back and removes that box, similar to how tag-input UIs behave.
    if (e.key === "Backspace" && input.value === "") {
        const prev = slot.previousElementSibling;
        if (prev && !isLastSlot(slot)) {
            e.preventDefault();
            removeSlot(slot);
            const prevInput = prev.querySelector("input");
            prevInput.focus();
            prevInput.setSelectionRange(prevInput.value.length, prevInput.value.length);
        }
    }
}

function removeSlot(slot) {
    // Invariant to protect: there must always be exactly one trailing empty box.
    // So the trailing box itself can never be removed via the × button, and we
    // never let the row drop to zero boxes.
    if (isLastSlot(slot)) return;
    if (boxRow.children.length <= 1) return;

    const wasFocused = slot.querySelector("input") === document.activeElement;
    slot.remove();

    if (wasFocused) {
        const last = boxRow.lastElementChild;
        if (last) last.querySelector("input").focus();
    }
}

function getNumbers() {
    const inputs = Array.from(boxRow.querySelectorAll(".num-box"));
    return inputs
        .map(inp => inp.value.trim())
        .filter(v => v !== "")
        .map(Number)
        .filter(n => !isNaN(n));
}

function initBoxes() {
    boxRow.innerHTML = "";
    slotCounter = 0;
    // "Obviously start with 2" - two empty boxes to begin.
    boxRow.appendChild(createSlot());
    boxRow.appendChild(createSlot());
}

// --- PREDICTION LOGIC (unchanged) ---
function isPrime(n) {
    if (n < 2 || !Number.isInteger(n)) return false;
    for (let i = 2; i <= Math.sqrt(n); i++) {
        if (n % i === 0) return false;
    }
    return true;
}

const patterns = [
    {
        name: "Constant",
        confidence: 100,
        match: (nums) => nums.every(x => x === nums[0]),
        predict: (nums) => [nums[0], nums[0], nums[0]]
    },
    {
        name: "Arithmetic",
        confidence: 100,
        match: (nums) => {
            const d = nums[1] - nums[0];
            return nums.every((v, i) => i < 1 || v - nums[i - 1] === d);
        },
        predict: (nums) => {
            const d = nums[1] - nums[0];
            const last = nums.at(-1);
            return [last + d, last + 2 * d, last + 3 * d];
        }
    },
    {
        name: "Geometric",
        confidence: 100,
        match: (nums) => {
            if (nums.length < 2) return false;
            const r = nums[1] / nums[0];
            if (isNaN(r) || !isFinite(r)) return false;
            for (let i = 1; i < nums.length; i++) {
                if (nums[i - 1] === 0 && nums[i] !== 0) return false;
                if (nums[i - 1] !== 0 && (nums[i] / nums[i - 1] !== r)) return false;
            }
            return true;
        },
        predict: (nums) => {
            const r = nums[1] / nums[0];
            let last = nums.at(-1);
            return Array.from({ length: 3 }, () => last *= r);
        }
    },
    {
        name: "Fibonacci",
        confidence: 100,
        match: (nums) => {
            if (nums.length < 3) return false;
            for (let i = 2; i < nums.length; i++) {
                if (nums[i] !== nums[i - 1] + nums[i - 2]) return false;
            }
            return true;
        },
        predict: (nums) => {
            let a = nums.at(-2), b = nums.at(-1);
            return Array.from({ length: 3 }, () => {
                let c = a + b;
                a = b; b = c;
                return c;
            });
        }
    },
    {
        name: "Perfect Squares",
        confidence: 100,
        match: (nums) => nums.every(x => x >= 0 && Number.isInteger(Math.sqrt(x))),
        predict: (nums) => {
            const roots = nums.map(Math.sqrt);
            const rLast = roots.at(-1);
            const rDiff = roots.length > 1 ? roots[1] - roots[0] : 1;
            return [1, 2, 3].map(i => (rLast + i * rDiff) ** 2);
        }
    },
    {
        name: "Perfect Cubes",
        confidence: 100,
        match: (nums) => nums.every(x => Math.abs(Math.cbrt(x) - Math.round(Math.cbrt(x))) < 1e-10),
        predict: (nums) => {
            const roots = nums.map(x => Math.round(Math.cbrt(x)));
            const rLast = roots.at(-1);
            const rDiff = roots.length > 1 ? roots[1] - roots[0] : 1;
            return [1, 2, 3].map(i => (rLast + i * rDiff) ** 3);
        }
    },
    {
        name: "Triangular Numbers",
        confidence: 100,
        match: (nums) => nums.every(x => {
            if (x < 0) return false;
            const n = Math.floor((Math.sqrt(8 * x + 1) - 1) / 2);
            return n * (n + 1) / 2 === x;
        }),
        predict: (nums) => {
            const getIdx = x => Math.floor((Math.sqrt(8 * x + 1) - 1) / 2);
            const nLast = getIdx(nums.at(-1));
            const nDiff = nums.length > 1 ? getIdx(nums[1]) - getIdx(nums[0]) : 1;
            return [1, 2, 3].map(i => {
                const x = nLast + (i * nDiff);
                return (x * (x + 1)) / 2;
            });
        }
    },
    {
        name: "Prime Numbers",
        confidence: 95,
        match: (nums) => nums.every(isPrime),
        predict: (nums) => {
            const next = [];
            let p = nums.at(-1);
            while (next.length < 3) {
                p++;
                if (isPrime(p)) next.push(p);
            }
            return next;
        }
    },
    {
        name: "Quadratic Sequence",
        confidence: 90,
        match: (nums) => {
            if (nums.length < 4) return false;
            const diff = nums.slice(1).map((v, i) => v - nums[i]);
            const second = diff.slice(1).map((v, i) => v - diff[i]);
            return second.every(x => x === second[0]);
        },
        predict: (nums) => {
            const diff = nums.slice(1).map((v, i) => v - nums[i]);
            let d = diff.at(-1);
            let s = diff[1] - diff[0];
            let last = nums.at(-1);
            return Array.from({ length: 3 }, () => {
                d += s;
                last += d;
                return last;
            });
        }
    },
    {
        name: "Alternating Arithmetic",
        confidence: 90,
        match: (nums) => {
            if (nums.length < 6) return false;
            const odd = nums.filter((_, i) => i % 2 === 0);
            const even = nums.filter((_, i) => i % 2 !== 0);
            const d1 = odd[1] - odd[0];
            const d2 = even[1] - even[0];
            return odd.every((v, i) => i < 1 || v - odd[i - 1] === d1) &&
                   even.every((v, i) => i < 1 || v - even[i - 1] === d2);
        },
        predict: (nums) => {
            const odd = nums.filter((_, i) => i % 2 === 0);
            const even = nums.filter((_, i) => i % 2 !== 0);
            const d1 = odd[1] - odd[0];
            const d2 = even[1] - even[0];

            let lastIsEven = (nums.length % 2 === 0);
            let nextD1 = odd.at(-1);
            let nextD2 = even.at(-1);
            const next = [];

            for (let i = 1; i <= 3; i++) {
                if ((lastIsEven && i % 2 !== 0) || (!lastIsEven && i % 2 === 0)) {
                    nextD1 += d1;
                    next.push(nextD1);
                } else {
                    nextD2 += d2;
                    next.push(nextD2);
                }
            }
            return next;
        }
    }
];

// --- MAIN EXECUTION HANDLER ---
function predict() {
    const resultEl = document.getElementById("result");
    if (!resultEl) return;

    const nums = getNumbers();

    if (nums.length < 2) {
        resultEl.innerHTML = "<p class='error'>Enter at least 2 numbers.</p>";
        return;
    }

    const matchedPattern = patterns.find(p => p.match(nums));

    if (!matchedPattern) {
        resultEl.innerHTML =
            "<h3>No exact pattern detected.</h3>" +
            "<p style='color: #6b7280; font-size: 0.875rem;'>Try entering a longer historical pattern sequence (at least 5 or 6 numbers).</p>";
        return;
    }

    const nextNumbers = matchedPattern.predict(nums);

    resultEl.innerHTML = `
        <h3 style="margin-top:0; margin-bottom:0.5rem; color:#4b5563; font-size:0.875rem; text-transform:uppercase; letter-spacing:0.05em;">Detected Pattern</h3>
        <strong style="font-size:1.25rem; color:#111827;">${matchedPattern.name}</strong>
        <p style="margin: 0.5rem 0 1rem 0; font-size:0.875rem; color:#6b7280;">Confidence Level: <b>${matchedPattern.confidence}%</b></p>
        <h4 style="margin-bottom:0.25rem; color:#4b5563;">Next 3 Numbers:</h4>
        <h2 style="color:#2563eb; margin:0; font-size:1.75rem; letter-spacing: 0.05em;">
            ${nextNumbers.join(" , ")}
        </h2>
    `;
}

initBoxes();
</script>

</body>
</html>
